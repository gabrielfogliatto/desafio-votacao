spring:
  application:
    name: votacao-api
  datasource:
    url: jdbc:h2:file:./data/votacao-db;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  jackson:
    default-property-inclusion: non_null

server:
  port: 8080

app:
  voting-session:
    default-duration: PT1M

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    br.com.cooperativa.votacao: INFO
